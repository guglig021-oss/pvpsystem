name: Build PvPSystem

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn -f "PvPSystem (2) (2)/PvPSystem/pom.xml" clean package
      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: PvPSystem
          path: "PvPSystem (2) (2)/PvPSystem/target/PvPSystem-1.0.0.jar"
